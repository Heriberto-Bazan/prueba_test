services:
  database:
    build:
      context: ./docker/database
    container_name: invoice_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: invoice_db
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - invoice_net

  php:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: invoice_php
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/xdebug-linux.ini:/usr/local/etc/php/conf.d/xdebug.ini
    environment:
      APP_ENV: dev
      APP_SECRET: s3cr3t_ch4ng3_m3
      DATABASE_URL: postgresql://invoice_user:invoice_pass@database:5432/invoice_db?serverVersion=16
    depends_on:
      - database
    networks:
      - invoice_net

  nginx:
    build:
      context: ./docker/nginx
    container_name: invoice_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - invoice_net

  node:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
    container_name: invoice_front
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.nuxt
    environment:
      API_BASE_URL: http://nginx:80
      NUXT_PUBLIC_API_URL: http://localhost:8000
    command: npx nuxt dev --host 0.0.0.0
    depends_on:
      - nginx
    networks:
      - invoice_net

volumes:
  pg_data:

networks:
  invoice_net:
    driver: bridge